name: Android CI APK Builder

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Create Secrets Placeholder Files
      run: |
        # Creates empty .env files so the Secrets Gradle Plugin builds successfully without issues
        touch .env
        mkdir -p app
        touch app/.env

    - name: Restore or Generate Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore.base64..."
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "debug.keystore.base64 not found, creating a standard debug.keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Ensure clean and valid Gradle Wrapper
      run: |
        # Avoid Git line-ending / binary corruption by generating a clean wrapper on the VM
        rm -f gradle/wrapper/gradle-wrapper.jar
        gradle wrapper --gradle-version 9.3.1 --distribution-type bin
        sed -i -e 's/\r$//' gradlew
        chmod +x gradlew

    - name: Build Debug APK with Gradle
      run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

    - name: Upload Build Artifacts (APK)
      uses: actions/upload-artifact@v4
      with:
        name: Land-Calculator-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

