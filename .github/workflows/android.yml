name: Android CI APK Builder

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Create Secrets Placeholder Files
      run: |
        # Creates empty .env files so the Secrets Gradle Plugin builds successfully without issues
        touch .env
        mkdir -p app
        touch app/.env

    - name: Grant Execute Permission for Gradle Wrapper
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        else
          echo "Gradle wrapper not found, setting up gradle..."
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
        fi

    - name: Build Debug APK with Gradle
      run: ./gradlew :app:assembleDebug --stacktrace

    - name: Upload Build Artifacts (APK)
      uses: actions/upload-artifact@v4
      with:
        name: Land-Calculator-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
